<main class="modcp">

<form action="{S_ACTION}" method="post" name="post">
  
  <h2 class="page-title">{L_TITLE}</h2>
  <section class="stack column">
  <menu class="stack column">
    <li>{L_FROM_TOPIC}</li>
    <li>{L_FROM_TOPIC_EXPLAIN}</li>
    <li>{FROM_TOPIC_TITLE}</li>
  </menu>
  <menu class="stack column">
    <li>{L_TO_TOPIC}</li>
    <li>{L_TO_TOPIC_EXPLAIN}</li>
    <li>{TO_TOPIC_TITLE}</li>
    <li>
      <input type="hidden" name="from_topic" value="{FROM_TOPIC}" />
      <input type="hidden" name="to_topic" value="{TO_TOPIC}" />
      <input class="button" type="submit" name="select_to" value="{L_SEARCH}" />
    </li>
  </menu>
  <menu class="stack">
    <input type="hidden" name="fid" value="{CURRENT_FID}" />
    <li><input class="button" type="submit" name="submit" value="{L_SUBMIT}" /></li>
    <li><input class="button" type="submit" name="refresh" value="{L_REFRESH}" /></li>
    {S_HIDDEN_FIELDS}
  </menu>
  </section>
</form>
</main>
