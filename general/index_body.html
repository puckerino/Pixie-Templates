{JAVASCRIPT}

<div id="popover-login" popover>
  <form action="{S_LOGIN_ACTION}" method="post" name="form_login">
    <menu class="stack column">
      <li class="form-control">
        <label>{L_USERNAME}</label>
        <input class="post" type="text" size="10" name="username" />
      </li>
      <li class="form-control">
        <label>{L_PASSWORD}</label>
        <input class="post" type="password" size="10" name="password" />
      </li>
      <li class="form-control">
        <label>{L_AUTO_LOGIN}</label>
        <input type="checkbox" name="autologin" {AUTOLOGIN_CHECKED} />
      </li>
      {S_HIDDEN_FIELDS}
      <li class="form-control">
        <input type="submit" name="login" value="{L_LOGIN}" />
      </li>
    </menu>
  </form>
</div>


<main class="index">
{BOARD_INDEX}
</main>

<!-- BEGIN disable_viewonline -->
<!-- BEGIN switch_group_legend -->
<section class="group-legend" style="display: none;">
  {GROUP_LEGEND}
</section>
<!-- END switch_group_legend -->
<!-- END disable_viewonline -->
<div id="footer-online" style="display: none;">
  <div id="total_users">{TOTAL_USERS_ONLINE}</div>
  <div id="online_users">{LOGGED_IN_USER_LIST}</div>
  <div id="last_connected">{L_CONNECTED_MEMBERS} </div>
</div>
