<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<body>
<!-- END html_validation -->
<div id="simple-wrap">
	<form action="{S_SEARCH_ACTION}" method="post" name="search">
          <a href="javascript:window.close();">{L_CLOSE_WINDOW}</a>
          <section class="stack column">
            <h2 class="page-title">{L_SEARCH_USERNAME}</h2>
            <p>{L_SEARCH_EXPLAIN}</p>
            <input type="text" name="search_username" value="{USERNAME}" />
            <input type="submit" name="search" value="{L_SEARCH}" />
            <!-- BEGIN switch_select_name -->
            <select name="username_list">{S_USERNAME_OPTIONS}</select>
            <input type="button" name="use" value="{L_SELECT}" onclick="refresh_username(this.form.username_list.options[this.form.username_list.selectedIndex].value);" />
            <!-- END switch_select_name -->
          </section>
	</form>
</div>
</body>
</html>
