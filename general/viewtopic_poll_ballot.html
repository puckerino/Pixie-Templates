<form method="post" action="{S_POLL_ACTION}">
  <h3 class="page-subtitle">
    {POLL_QUESTION}
  </h3>
  <article class="close-poll">{CLOSE_POLL}</article>
  <menu class="polls stack column">
    <!-- BEGIN poll_option -->
    <li class="form-control">
      <input type="{poll_option.POLL_TYPE_BUTTON}" name="vote_id[]" value="{poll_option.POLL_OPTION_ID}" />
      <label>{poll_option.POLL_OPTION_CAPTION}</label>
    </li>
    <!-- END poll_option -->
  </menu>
  <section class="stack">
    <input type="submit" name="submit" value="{L_SUBMIT_VOTE}" class="button" />
  </section>
  <article class="topic-actions topic-actions-bottom">
    <menu class="stack column">
      <li><a href="{U_VIEW_RESULTS}">{L_VIEW_RESULTS}</a></li>
    <!-- BEGIN warning_public_votes -->
      <li>{warning_public_votes.L_WARNING_PUBLIC_VOTES}</li>
    <!-- END warning_public_votes -->
      <li>{L_VOTE_EXPIRE}</li>
      {S_HIDDEN_FIELDS}
    </menu>
  </article>
</form>
