<main class="search-list list-topics">
  <form action="{S_ACTION}" method="post" name="post" onsubmit="return verify_select();">
    <h2 class="page-title">{L_SEARCH_MATCHES}</h2>
    <article class="pagination">{PAGINATION}</article>
    <section class="stack column has-spacing">
      <!-- BEGIN searchresults -->
      <article class="topic">
        <figure class="icon">
          <img src="{searchresults.TOPIC_FOLDER_IMG}" />
        </figure>
        <a class="title" href="{searchresults.U_VIEW_TOPIC}">{searchresults.TOPIC_TITLE}</a>
        <span class="author username">{searchresults.TOPIC_AUTHOR}</span>
        <a class="location" href="{searchresults.U_VIEW_FORUM}">{searchresults.FORUM_NAME}</a>
        <menu class="data">
          <li>{searchresults.REPLIES}</li>
          <li>{searchresults.VIEWS}</li>
        </menu>
        <section class="lastpost">
            <figure class="avatar-lastpost-topic">
              {searchresults.LAST_POST_IMG}
            </figure>
          <menu>
            <li class="username">{searchresults.LAST_POST_AUTHOR}</li>
            <li class="date">{searchresults.LAST_POST_TIME}</li>
          </menu>
        </section>
      </article>
      <!-- END searchresults -->
    </section>
    <article class="pagination">{PAGINATION}</article>
  </form>
</main>
