<section class="privmsgs-preview">
<h2 class="page-title">{L_PREVIEW}</h2>

<article class="post">
    <hgroup class="privmsg-header">
        <span class="username">
            {MESSAGE_FROM}
        </span>
    </hgroup>
    <menu class="privmsg-data">
        <li class="title">{POST_SUBJECT}</li>
        <li class="date">{POST_DATE}</li>
        <li class="to">{MESSAGE_TO}</li>
    </menu>
	<article class="post-body">
		<div class="content message">{MESSAGE_NEW}</div>
	</article>
</article>
</section>
